# cors-proxy/wrangler.toml
# Cloudflare Worker deploy config
#
# Deploy: cd cors-proxy && wrangler deploy
# Local test: wrangler dev
#
# Prerequisites:
#   npm install -g wrangler
#   wrangler login

name       = "streamvex-cors-proxy"
main       = "worker.js"
compatibility_date = "2024-09-23"

# ── Environment Variables ─────────────────────────────
# ✅ [Update] ALLOW_ALL_DOMAINS=true — যেকোনো m3u8 link (Chrome-এ যেটা
# সরাসরি open হয়) proxy দিয়ে চালানোর জন্য domain allowlist bypass করা।
# বাকি সব security layer (extension-only check, private IP block,
# GET/HEAD only, 10MB size limit) আগের মতোই কাজ করে — শুধু
# DEFAULT_ALLOWED_DOMAINS list-টা আর enforce হবে না।
[vars]
ALLOW_ALL_DOMAINS = "true"

# Dashboard থেকেও override করা যায়:
# Cloudflare Dashboard > Workers > Settings > Variables and Secrets
#
# ALLOWED_DOMAINS   = "comma,separated,list,of,domains"
#   (নির্দিষ্ট কিছু domain-এ ফিরে যেতে চাইলে ALLOW_ALL_DOMAINS বাদ দিয়ে এটা সেট করো)

# ── Routes ───────────────────────────────────────────
# Custom domain দিতে চাইলে এই section uncomment করো:
# routes = [
#   { pattern = "proxy.streamvex.live/*", zone_name = "streamvex.live" }
# ]

# ── Rate Limiting (Cloudflare Dashboard এ set করো) ───
# Workers > Settings > Rate Limiting Rules:
#   Threshold: 100 req/min per IP
#   Action:    Block (429)